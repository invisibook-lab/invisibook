<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MPC Hello</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>

  <body>
    <!-- gh pages deployment check -->

    <div class="app">
      <div class="header">
        <div class="header-content">
          <h1>Order Book Exchange</h1>
          <div class="connection-controls">
            <div id="connection-section" class="connection-section">
              <button id="host-btn" class="btn-small">Create</button>
              <button id="join-btn" class="btn-small">Join</button>
            </div>
            <div id="connection-status" class="connection-status hidden">
              <span id="connection-text">Connected</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 连接对话框 -->
      <div id="connection-modal" class="modal hidden">
        <div class="modal-content">
          <div id="host-modal" class="modal-section hidden">
            <h3>Order Book Created</h3>
            <p>Share this code with the other party:</p>
            <div id="host-code" class="code-box"></div>
            <p class="waiting-text">Waiting for connection...</p>
          </div>
          <div id="join-modal" class="modal-section hidden">
            <h3>Join Order Book</h3>
            <div class="input-group">
              <label for="join-code-input">Enter connection code:</label>
              <input type="text" id="join-code-input" class="input-field" placeholder="Enter code here" />
            </div>
            <div id="join-submit-container">
              <button id="join-submit-btn" class="btn-primary">Connect</button>
            </div>
            <div id="join-spinner" class="spinner-container hidden">
              <div class="spinner"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="main-container">
        <!-- 左侧：订单表单 -->
        <div class="order-panel">
          <div class="trading-pair">
            <h2>ETH - USDT</h2>
          </div>

          <div class="order-form">
            <div class="order-type-selector">
              <button id="buy-type-btn" class="order-type-btn active" data-type="buy">Buy (买入)</button>
              <button id="sell-type-btn" class="order-type-btn" data-type="sell">Sell (卖出)</button>
            </div>

            <div class="input-group">
              <label for="amount-input">Amount (数量):</label>
              <input type="number" id="amount-input" class="input-field" placeholder="0.00" step="0.01" min="0" />
              <span class="input-hint" id="amount-hint">ETH</span>
            </div>

            <div class="input-group">
              <label for="price-input">Price (报价):</label>
              <input type="number" id="price-input" class="input-field" placeholder="0.00" step="0.01" min="0" />
              <span class="input-hint">USDT</span>
            </div>

            <div class="order-summary">
              <div class="summary-row">
                <span>Total:</span>
                <span id="total-amount">0.00 USDT</span>
              </div>
            </div>

            <button id="submit-order-btn" class="btn-submit" disabled>Submit Order</button>
          </div>
        </div>

        <!-- 右侧：订单簿 -->
        <div class="orderbook-panel">
          <div class="orderbook-header">
            <h3>Order Book</h3>
            <div class="orderbook-tabs">
              <button class="tab-btn active" data-tab="all">All Orders</button>
              <button class="tab-btn" data-tab="buy">Buy Orders</button>
              <button class="tab-btn" data-tab="sell">Sell Orders</button>
            </div>
          </div>

          <div class="orderbook-content">
            <div class="orderbook-table">
              <div class="table-header">
                <div class="col-type">Type</div>
                <div class="col-amount">Amount</div>
                <div class="col-price">Price</div>
                <div class="col-total">Total</div>
                <div class="col-hash">P2P Hash</div>
                <div class="col-status">Status</div>
              </div>
              <div id="order-list" class="table-body">
                <div class="empty-state">No orders yet</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 处理中提示 -->
      <div id="processing-overlay" class="processing-overlay hidden">
        <div class="processing-content">
          <p id="progress-text">Processing order...</p>
          <div class="spinner-container">
            <div class="spinner"></div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="src/main.ts"></script>
  </body>
</html>
