# Invisibook Chain Configuration

node_type   = 0          # 0: FullNode
data_dir    = "data"
sync_mode   = 0          # 0: FullSync
run_mode    = 0          # 0: local-node
http_port   = "7999"
ws_port     = "8999"
log_level   = "info"
log_output  = ""         # empty = stderr
lei_limit   = 50000
statedb_type = ""

[kvdb]
kv_type = "pebble"
path    = "yu.db"

[txn_conf]

[sqlite_db_conf]
path = "sqlite.db"

[block_chain]
chain_id   = 1926
cache_size = 10

  [block_chain.chain_db]
  sql_db_type = "sqlite"
  dsn         = "chain.db"

[txpool]
pool_size    = 2048
txn_max_size = 1024000

[p2p]
p2p_listen_addrs  = ["/ip4/127.0.0.1/tcp/8887"]
bootnodes         = []
protocol_id       = "invisibook"
node_key_type     = 1      # 1: Ed25519
node_key_rand_seed = 1
