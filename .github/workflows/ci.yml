name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/doc/**'
      - '**/README.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/doc/**'
      - '**/README.md'

jobs:
  # ────────────────────── Go: chain ──────────────────────
  chain:
    name: Chain (Go)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: chain/go.mod

      - name: Install dependencies
        working-directory: chain
        run: go mod download

      - name: Build chain
        working-directory: chain
        run: go build .

      - name: Vet
        working-directory: chain
        run: go vet .

  # ────────────────────── Rust: lib ──────────────────────
  lib:
    name: Lib (Rust)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            lib/target
          key: ${{ runner.os }}-cargo-lib-${{ hashFiles('lib/Cargo.lock') }}

      - name: Build lib
        working-directory: lib
        run: cargo build

      - name: Test lib
        working-directory: lib
        run: cargo test

  # ────────────────────── Rust: cli ──────────────────────
  cli:
    name: CLI (Rust)
    runs-on: ubuntu-latest
    needs: lib

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cli/target
          key: ${{ runner.os }}-cargo-cli-${{ hashFiles('cli/Cargo.lock') }}

      - name: Build cli
        working-directory: cli
        run: cargo build

  # ────────────────────── Rust: app (desktop) ──────────────────────
  app-desktop:
    name: App Desktop (Rust)
    runs-on: ubuntu-latest
    needs: lib

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            lld

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/target
          key: ${{ runner.os }}-cargo-app-${{ hashFiles('app/Cargo.lock') }}

      - name: Build desktop app
        working-directory: app/desktop
        run: cargo build
